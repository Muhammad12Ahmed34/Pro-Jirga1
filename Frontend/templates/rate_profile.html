{% extends "base.html" %}
{% block title %}Rate — Pro Jirga{% endblock %}
{% block content %}
<section class="narrow center">
  <div class="card">
    <p class="eyebrow">10 seconds</p>
    <h1>How was working with <span class="accent-gradient">{{ user.name }}</span>?</h1>

    <form action="{{ url_for('rate_profile_submit', username=profile_slug) }}" method="post" class="form">
      <div class="stars-input" role="radiogroup" aria-label="Rate 1 to 5 stars">
        {% for i in range(1,6) %}
        <input type="radio" name="stars" id="star{{ i }}" value="{{ i }}" required>
        <label for="star{{ i }}" class="star-btn" aria-label="{{ i }} stars">★</label>
        {% endfor %}
      </div>

      <div class="field">
        <label for="tag" class="label">One word or phrase</label>
        <input type="text" id="tag" name="tag" placeholder="e.g. reliable, fast learner, ships on time" maxlength="30" required>
      </div>

      <button type="submit" class="btn btn-primary btn-block btn-lg">Submit rating</button>
    </form>
  </div>
</section>
{% endblock %}
