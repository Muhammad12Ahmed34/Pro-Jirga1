<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Pro Jirga{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
  <header class="nav">
    <div class="nav-inner">
      <a href="{{ url_for('dashboard') if current_user else url_for('landing') }}" class="logo">
        <span class="logo-mark">◆</span> Pro Jirga
      </a>
      {% if current_user %}
      <nav class="nav-links">
        <a href="{{ url_for('dashboard') }}">Dashboard</a>
        <a href="{{ url_for('profile', username=current_user.github_username or current_user.phone) }}">Profile</a>
        <a href="{{ url_for('logout') }}" class="muted">Logout</a>
      </nav>
      {% endif %}
    </div>
  </header>

  <main class="main">
    {% block content %}{% endblock %}
  </main>

  <footer class="footer">
    <div class="footer-inner">
      <span>Pro Jirga</span>
      <span class="muted">Receipts, not resumes.</span>
    </div>
  </footer>

  <script src="{{ url_for('static', filename='js/main.js') }}"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
